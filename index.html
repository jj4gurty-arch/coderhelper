<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coder Helper - Maintenance</title>
<meta name="description" content="Coder Helper is under maintenance. Please wait while we fix the website.">
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(145deg,#0f172a,#1e293b);
    color: #fff;
    overflow: hidden;
    text-align: center;
  }

  h1 {
    font-size: 6rem;
    margin-bottom: 20px;
    animation: shake 1s infinite;
  }

  p {
    font-size: 1.5rem;
    margin-bottom: 40px;
  }

  /* Clock */
  .clock {
    width: 100px;
    height: 100px;
    border: 5px solid #fbbf24;
    border-radius: 50%;
    position: relative;
    margin-bottom: 50px;
    background: #1e293b;
    box-shadow: 0 0 20px #fbbf24;
  }
  .hand {
    position: absolute;
    width: 4px;
    height: 40px;
    background: #fbbf24;
    top: 10px;
    left: 48px;
    transform-origin: bottom;
    animation: tick 1s infinite linear;
  }

  /* Car */
  .car {
    width: 80px;
    height: 40px;
    background: #38bdf8;
    border-radius: 8px;
    position: absolute;
    bottom: 20px;
    left: -120px;
    animation: drive 4s linear infinite;
    box-shadow: 0 5px 10px rgba(0,0,0,0.5);
  }

  /* Clock pieces */
  .piece {
    width: 15px;
    height: 15px;
    background: #fbbf24;
    position: absolute;
    border-radius: 3px;
    opacity: 0;
  }

  /* Animations */
  @keyframes drive {
    0% { left: -120px; transform: rotate(0deg); }
    50% { left: 50%; transform: rotate(15deg); }
    55% { transform: rotate(-15deg); }
    60% { transform: rotate(0deg); }
    100% { left: 120%; transform: rotate(0deg); }
  }

  @keyframes shake {
    0% { transform: rotate(0deg); }
    25% { transform: rotate(5deg); }
    50% { transform: rotate(-5deg); }
    75% { transform: rotate(5deg); }
    100% { transform: rotate(0deg); }
  }

  @keyframes tick {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  @keyframes fly {
    0% { opacity: 1; transform: translate(0,0) rotate(0deg); }
    100% { opacity: 0; transform: translate(var(--x), var(--y)) rotate(720deg); }
  }
</style>
</head>
<body>
  <h1>😭</h1>
  <p>Fixing the Coder Helper… it’s taking some time!</p>

  <div class="clock" id="clock">
    <div class="hand"></div>
  </div>

  <div class="car" id="car"></div>

  <p>🚗💥🕒 (Don’t worry, we’re working on it!)</p>

  <!-- Pieces will appear here -->
  <script>
    const clock = document.getElementById('clock');
    const car = document.getElementById('car');

    function crash() {
      for(let i=0;i<8;i++){
        const piece = document.createElement('div');
        piece.className = 'piece';
        piece.style.setProperty('--x', (Math.random()*200-100)+'px');
        piece.style.setProperty('--y', (-Math.random()*200)+'px');
        piece.style.left = '42px';
        piece.style.top = '42px';
        clock.appendChild(piece);
        piece.style.animation = 'fly 1s forwards';
        setTimeout(()=>piece.remove(),1000);
      }
    }

    // Trigger crash when car is roughly at clock
    setInterval(()=>{
      const carRect = car.getBoundingClientRect();
      const clockRect = clock.getBoundingClientRect();
      if(carRect.left + carRect.width/2 > clockRect.left &&
         carRect.left + carRect.width/2 < clockRect.right){
        crash();
      }
    },100);
  </script>
</body>
</html>
